name: Onboard Repo

on:
  issues:
    types: [labeled]

jobs:
  onboard:
    if: |
      github.event.label.name == 'approved' &&
      contains(github.event.issue.labels.*.name, 'onboarding')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Parse issue body
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body;

            const extract = (label) => {
              const re = new RegExp(`### ${label}\\s*\\n+([^\\n#]+)`);
              const m = body.match(re);
              return m ? m[1].trim() : '';
            };

            const repo    = extract('Target repository \\(org/repo\\)');
            const trigger = extract('Workflow trigger');
            const configOverrides = (() => {
              const re = /### Config overrides \(optional\)\s*\n+([\s\S]*?)(?=\n###|$)/;
              const m = body.match(re);
              const raw = m ? m[1].trim() : '';
              return (raw === '_No response_' || raw === '') ? '' : raw;
            })();

            if (!repo || !trigger) {
              core.setFailed('Could not parse required fields from issue body.');
              return;
            }

            const [repoOwner, repoName] = repo.split('/');
            if (!repoOwner || !repoName) {
              core.setFailed(`Invalid repo format: "${repo}". Expected "org/repo".`);
              return;
            }

            core.setOutput('repo',             repo);
            core.setOutput('repo_owner',       repoOwner);
            core.setOutput('repo_name',        repoName);
            core.setOutput('trigger',          trigger);
            core.setOutput('config_overrides', configOverrides);

      - name: Post "in progress" comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body: '⏳ Onboarding **${{ steps.parse.outputs.repo }}** — running now…'
            });

      - name: Checkout (for workflow templates)
        uses: actions/checkout@v4

      - name: Resolve or create SonarCloud project
        id: sonar_project
        env:
          SONAR_ADMIN_TOKEN:  ${{ secrets.SONAR_ADMIN_TOKEN }}
          SONAR_HOST_URL:     ${{ vars.SONAR_HOST_URL }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
          GITHUB_ALM_SETTING: ${{ vars.GITHUB_ALM_SETTING }}
          TARGET_REPO:        ${{ steps.parse.outputs.repo }}
          REPO_NAME:          ${{ steps.parse.outputs.repo_name }}
        run: |
          CANDIDATE_KEY="${SONAR_ORGANIZATION}_${REPO_NAME}"

          # Search for an existing project matching the repo name
          SEARCH=$(curl -sf \
            "${SONAR_HOST_URL}/api/components/search?qualifiers=TRK&organization=${SONAR_ORGANIZATION}&q=${REPO_NAME}" \
            -H "Authorization: Bearer ${SONAR_ADMIN_TOKEN}")

          EXISTING_KEY=$(echo "$SEARCH" | jq -r \
            --arg key "$CANDIDATE_KEY" \
            '.components[] | select(.key == $key) | .key' | head -1)

          if [ -n "$EXISTING_KEY" ]; then
            echo "Found existing SonarCloud project: ${EXISTING_KEY}"
            echo "project_key=${EXISTING_KEY}" >> "$GITHUB_OUTPUT"
            echo "project_created=false"       >> "$GITHUB_OUTPUT"
          else
            echo "No existing project found for ${CANDIDATE_KEY} — creating…"

            curl -sf -X POST \
              "${SONAR_HOST_URL}/api/projects/create" \
              -H "Authorization: Bearer ${SONAR_ADMIN_TOKEN}" \
              --data-urlencode "name=${REPO_NAME}" \
              --data-urlencode "project=${CANDIDATE_KEY}" \
              --data-urlencode "organization=${SONAR_ORGANIZATION}" \
              --data-urlencode "visibility=private"

            # Bind the new project to the GitHub repo for PR decoration
            curl -sf -X POST \
              "${SONAR_HOST_URL}/api/alm_settings/set_github_binding" \
              -H "Authorization: Bearer ${SONAR_ADMIN_TOKEN}" \
              --data-urlencode "almSetting=${GITHUB_ALM_SETTING}" \
              --data-urlencode "project=${CANDIDATE_KEY}" \
              --data-urlencode "repository=${TARGET_REPO}" \
              --data-urlencode "summaryCommentEnabled=true" \
              --data-urlencode "monorepo=false"

            echo "Created and bound SonarCloud project: ${CANDIDATE_KEY}"
            echo "project_key=${CANDIDATE_KEY}" >> "$GITHUB_OUTPUT"
            echo "project_created=true"         >> "$GITHUB_OUTPUT"
          fi

      - name: Generate scoped SonarCloud token
        id: sonar_token
        env:
          SONAR_ADMIN_TOKEN: ${{ secrets.SONAR_ADMIN_TOKEN }}
          SONAR_HOST_URL:    ${{ vars.SONAR_HOST_URL }}
          PROJECT_KEY:       ${{ steps.sonar_project.outputs.project_key }}
          REPO_NAME:         ${{ steps.parse.outputs.repo_name }}
        run: |
          TOKEN_NAME="sonar-fix-${REPO_NAME}-$(date +%Y%m%d)"

          RESPONSE=$(curl -sf -X POST \
            "${SONAR_HOST_URL}/api/project_analysis_tokens/generate" \
            -H "Authorization: Bearer ${SONAR_ADMIN_TOKEN}" \
            --data-urlencode "projectKey=${PROJECT_KEY}" \
            --data-urlencode "name=${TOKEN_NAME}" \
            --data-urlencode "type=PROJECT_ANALYSIS_TOKEN")

          SCOPED_TOKEN=$(echo "$RESPONSE" | jq -r '.token')

          if [ -z "$SCOPED_TOKEN" ] || [ "$SCOPED_TOKEN" = "null" ]; then
            echo "Failed to generate SonarCloud token. Response: $RESPONSE"
            exit 1
          fi

          echo "token_name=${TOKEN_NAME}" >> "$GITHUB_OUTPUT"
          echo "$SCOPED_TOKEN" > /tmp/sonar_token.txt

      - name: Set secrets and variables in target repo
        env:
          GH_TOKEN:       ${{ secrets.ONBOARDING_PAT }}
          TARGET_REPO:    ${{ steps.parse.outputs.repo }}
          PROJECT_KEY:    ${{ steps.sonar_project.outputs.project_key }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
        run: |
          gh secret set SONAR_TOKEN \
            --repo "$TARGET_REPO" \
            --body "$(cat /tmp/sonar_token.txt)"

          gh variable set SONAR_PROJECT_KEY \
            --repo "$TARGET_REPO" \
            --body "$PROJECT_KEY"

          gh variable set SONAR_HOST_URL \
            --repo "$TARGET_REPO" \
            --body "$SONAR_HOST_URL"

          rm /tmp/sonar_token.txt

      - name: Open onboarding PR in target repo
        env:
          GH_TOKEN:          ${{ secrets.ONBOARDING_PAT }}
          TARGET_REPO:       ${{ steps.parse.outputs.repo }}
          REPO_OWNER:        ${{ steps.parse.outputs.repo_owner }}
          REPO_NAME:         ${{ steps.parse.outputs.repo_name }}
          AGENT:             ${{ vars.SONAR_FIX_AGENT || 'copilot' }}
          TRIGGER:           ${{ steps.parse.outputs.trigger }}
          CONFIG_OVERRIDES:  ${{ steps.parse.outputs.config_overrides }}
          PROJECT_KEY:       ${{ steps.sonar_project.outputs.project_key }}
          PROJECT_CREATED:   ${{ steps.sonar_project.outputs.project_created }}
          ISSUE_NUMBER:      ${{ github.event.issue.number }}
          ONBOARDING_REPO:   ${{ github.repository }}
          TOKEN_NAME:        ${{ steps.sonar_token.outputs.token_name }}
        run: |
          bash scripts/open-onboarding-pr.sh

      - name: Post success comment
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const projectCreated = '${{ steps.sonar_project.outputs.project_created }}' === 'true';
            const projectKey     = '${{ steps.sonar_project.outputs.project_key }}';
            const repo           = '${{ steps.parse.outputs.repo }}';

            const lines = [
              `✅ **Onboarding complete for \`${repo}\`**\n`,
              projectCreated
                ? `- SonarCloud project \`${projectKey}\` created and bound to this repo`
                : `- SonarCloud project \`${projectKey}\` found (already existed)`,
              '- Scoped project analysis token generated and stored as `SONAR_TOKEN`',
              '- `SONAR_PROJECT_KEY` and `SONAR_HOST_URL` variables set',
              '- PR opened in target repo with sonar-fix workflow and config',
              '',
              'Merge the PR to activate automated fixing.'
            ];

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body: lines.join('\n')
            });
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              labels: ['onboarded']
            });

      - name: Post failure comment
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body: '❌ Onboarding failed for `${{ steps.parse.outputs.repo }}`. Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.'
            });
